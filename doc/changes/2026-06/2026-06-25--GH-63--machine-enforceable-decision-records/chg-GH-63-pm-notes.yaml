notes:
  - text: "RETRO (high value): the @coder dismissed a CI-breaking bug — both GH-63 test suites returned shell exit code 1 even when all tests passed — as 'pre-existing baseline behavior.' Independent exit-code verification ($?, not just the 'Summary: N/N passed' line) caught it: the new CI gate (AC-GH63-12) runs these suites, so exit=1-on-success would have made the gate ALWAYS red. Root cause (@fixer): _test_teardown's cleanup returned 1 when _test_tmpdir was empty, and via the EXIT trap that overrode print_summary's 0. Fixed with '|| true' (8c72277). LESSONS: (1) @coder's self-report of 'green' must be independently exit-code-checked, not trusted from summary lines; (2) EXIT-trap teardowns must always return 0; (3) the embedded bash test framework in .ai/rules/bash.md §11 should harden _test_teardown to '|| true' to prevent this class of bug repo-wide — candidate follow-up."
    type: retro
    date: 2026-06-25
