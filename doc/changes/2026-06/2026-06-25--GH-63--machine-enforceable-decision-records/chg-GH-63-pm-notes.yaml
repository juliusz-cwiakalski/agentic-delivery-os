decisions:
  - text: "SD-1 (schema source of truth): the front-matter schema documents GH-46's LANDED nested structure (id, decision_type, status, created, decision_date, last_updated, summary, owners, service + optional decision_area/scope/reversibility/review_date/business_impact/customer_impact + optional nested classification{}, governance{}, ai_assistance{}, revisit_triggers[], links{}). It does NOT adopt research §17.1's flat sketch (driver/decider/required_reviewers/rigor_profile as top-level keys) — GH-46 made the nesting decision (DEC-8 DACI under governance; classification block). Anchor artifact = ADR-0001 (the dogfood record) + doc/templates/decision-record-template.md. Rationale: ticket explicitly says 'validates the GH-46 front matter' and 'validates the GH-46 records (incl. ADR-0001 dogfood)'."
    date: 2026-06-25
  - text: "SD-2 (§28.3 negative-case scoping): the validator implements the §28.3 cases expressible against FRONT MATTER + CROSS-FIELD rules + PLANNING-SUMMARY structure. Cases requiring not-yet-landed machinery or body-content analysis are DOCUMENTED as deferred to sibling tickets, grounded in the ticket's own non-goals + out-of-scope ('validator focuses on front matter + cross-field rules'). IN-SCOPE negative cases: invalid decision_type; invalid status; impossible lifecycle transition (e.g. Accepted->Proposed; status/supersedes/superseded_by consistency); missing owners; missing governance.decider for Accepted R2/R3; missing decision_date for Accepted; R3 without governance.reviewers; same factor as both constraint and driver (planning-summary hard_requirements ∩ decision_drivers); non-negotiable constraint violation in chosen option (planning-summary, best-effort). DEFERRED (sibling machinery): R3 without evidence verification (needs evidence ledger -> GH-65); expired waiver (no waiver/expiry field landed); recommendation copied into final decision without authority (needs body-content rec/decision separation -> GH-64); strict accepted-rationale immutability detection (needs snapshot/diff machinery). This is an AC-interpretation decision affecting 'fails each negative case from §28.3' — surfaced explicitly to red-team for challenge; if challenged, formalize via @decision-advisor PDR before delivery."
    date: 2026-06-25
  - text: "SD-3 (planning-summary validation domain): the decision-planning-summary schema validates <decision_planning_summary> (generic) + legacy <technical_decision_planning_summary>/adr.* alias blocks. These are transient /plan-decision outputs (consumed by /write-decision), NOT durable repo files — grep confirms zero live planning-summary blocks persist under doc/changes or doc/decisions. Therefore: CI gate runs ONLY the front-matter validator on doc/decisions/*.md + schema files; the planning-summary validator is a tool/command validated with SYNTHETIC fixtures, invoked on demand (not CI-gated). Fixtures are committed under tools/.tests/ fixtures."
    date: 2026-06-25
  - text: "SD-4 (runtime = stdlib-only, no jsonschema pip dep): validator is bash + python3 stdlib (or jq). JSON Schema files (*.schema.json, draft 2020-12) are the declarative source of truth for docs/tooling; the validator ENCODES the same rules imperatively to avoid a jsonschema package dependency in CI (ubuntu-latest python3 lacks it; ticket says 'avoid a heavy runtime'). Drift risk between declarative schema and imperative validator is mitigated by: (a) the validator's tests asserting every schema rule, (b) a schema-vs-validator coverage check. This is a technical decision — if red-team flags the two-sources-of-truth drift risk as material, formalize via @decision-advisor TDR before delivery."
    date: 2026-06-25
  - text: "DEC-12 (R3 reviewer rule is acceptance-gated, resolves OQ-GH63-1 surfaced by @test-plan-writer): governance.reviewers required non-empty only when status=Accepted AND classification.rigor=R3 (mirrors the decider rule). Rationale: ADR-0001 is Proposed R3 with empty reviewers: [] and must pass (AC-1/AC-4); review happens during Under Review->Accepted, so requiring reviewers at Proposed is wrong. §28.3 'R3 without review' = an Accepted R3 lacking reviewers. Applied to spec (F-3, scope list, DM-1 row, AC-GH63-5, Appendix A row 10, glossary) and plan (tasks 2.4, 2.6). Non-blocking; surfaced to red-team."
    date: 2026-06-25
  - text: "DEC-13 (heuristic exit semantics, resolves OQ-GH63-3): best-effort heuristics (verification-criteria presence; non-negotiable-violation) emit NON-BLOCKING WARNINGS (exit 0), never fail the build. A failing check would be a structural guarantee, contradicting DEC-10. Hard rules fail (non-zero); heuristics warn. Applied to spec AC-GH63-6 + decision log + plan task 2.7."
    date: 2026-06-25

