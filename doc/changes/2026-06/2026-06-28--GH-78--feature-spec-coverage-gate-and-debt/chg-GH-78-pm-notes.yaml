notes:
  - text: "Red-team R1 (scope & approach review, @red-team-coordinator) = SHIP-WITH-FINDINGS. 6 perspectives (cto, pm, technical-writer, qa, devops, business-analyst). Verdict: intent sound; recommended two-PR (Option A') but user overrode to single-PR full-scope. 10 must-fix-before-spec items all folded into the decisions above and will be passed to spec-writer. Key risks flagged: spec!=behavior (write from agent prompts + AGENTS.md + scripts, not idealized); GH-79 ticket text defects (stale phase numbering, fold-in contradiction, GitHub-auto-linked #N ACs); doc/spec not covered by ados_distribution/license-header automation."
    type: info
    date: "2026-06-28"
  - text: "retro: combined two-ticket single-PR delivery is non-canonical for this repo (violates 'one ticket = one change' on 3 axes: artifact model, branch naming, DoR traceability). User explicitly chose it for delivery efficiency. Tradeoff accepted: harder review + revert-granularity loss vs. one-shot closure. If this pattern recurs, consider a documented 'multi-ticket PR' convention."
    type: retro
    date: "2026-06-28"
