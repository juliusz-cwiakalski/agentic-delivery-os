decisions:
  - text: "README Mermaid 'clickable links to guides' AC satisfied via adjacent markdown link table/legend immediately under the diagram. GitHub's Mermaid iframe sandbox blocks node click-callbacks (<click> + <a> in node labels do not render reliably), so node-clickability is not achievable; an adjacent link block is the GitHub-native way to give one-click access to each guide."
    date: 2026-06-28
  - text: "Research recommended a rendered PNG/SVG hero in README for max rendering reliability, but issue Non-goals explicitly forbid rendered image assets (Mermaid only). Human constraint wins — no PNG/SVG. Diagrams are Mermaid throughout."
    date: 2026-06-28
  - text: "Scope kept tightly to issue AC (process map + per-guide diagrams + navigation + consistency). Research surfaced broader README improvements (badges, 'who is this for', hero rework) that would further the adoption goal, but those are out of scope here — no AC for them, and expanding risks scope creep. Surfaced as a follow-up suggestion to the human, not invented scope."
    date: 2026-06-28
  - text: "New canonical guide named doc/guides/ados-processes.md per issue scope #1 (research informally suggested 'process-map.md'; the issue's explicit name is authoritative)."
    date: 2026-06-28
