  - text: "Retro: the new consistency guard went through 3 iterations during round-3 fixing — (1) full row-set equality was too strict (the handbook is an intentional condensed subset, not a full mirror — a real fact my own test taught me), (2) comm had a locale sort-order mismatch (switched to locale-independent grep -qxF). Lesson: when a guard's invariant proves too strict, the 'false positive' often reveals a genuine structural fact (here: full-vs-condensed matrix design) worth encoding precisely rather than relaxing blindly. Also: the round-3 red team caught that my first guard overclaimed its contract (header said it caught RT2-02; the check didn't) — value of reading the TEST, not just running it green."
    type: retro
    date: "2026-06-26"
