decisions:
  - text: "Extend @bootstrapper (not a new agent). Keep the name. Confirmed during inception scoping (pre-existing decision)."
    date: "2026-06-26"
  - text: "Inception mode state lives at doc/inception/inception-state.yaml (committed, git-tracked) — DISTINCT from legacy mode's .ai/local/bootstrapper-context.yaml (git-ignored). The two modes use two different state files. Legacy state file/location is untouched."
    date: "2026-06-26"
  - text: "PM-decided then REVERSED (see REM-1): originally planned to close the code-review-instructions gap in BOTH modes (inception Phase 5 mandatory + legacy recommended-list additive). REVERSED after red-team RT1-01: scoped to inception Phase 5 only. Legacy <phase_4_draft> stays pristine (AC16/NFR-4). No AC required the legacy addition."
    date: "2026-06-26"
  - text: "Structure the bootstrapper prompt with sub-mode sections: keep the existing 6-phase LEGACY mode section intact; add a parallel NEW-PROJECT INCEPTION mode section implementing phases 0-7. Mode is selected in Phase 0 (flow detection). Use <mode_new_project_inception> top-level section to keep the large prompt organized per ticket hint."
    date: "2026-06-26"
  - text: "REFERENCE doc/guides/project-inception.md (created in GH-69), do NOT recreate it. Amend the guide only if implementation experience reveals concrete gaps. The guide is the human-executable process authority; the agent prompt is the agent-executable authority — they must stay consistent."
    date: "2026-06-26"
  - text: "DEC-7 (OQ-1 resolved via TDR-0001, R2, acceptance at GH-71 PR): inception sub-mode = eight terse <phase_N_inception> sections nested under one <mode_new_project_inception> umbrella, PARALLEL to legacy <workflow_phases>; <mode_selection> router; additive <resume_behavior>/<write_allowlist> extensions. Control flow inline (self-contained-agent principle); content detail referenced from guide. Recorded standalone at doc/decisions/TDR-0001-bootstrapper-inception-submode-prompt-structure.md."
    date: "2026-06-26"
  - text: "DEC-5 (OQ-2 resolved): amend the guide in-repo ONLY when a gap is concrete AND blocking (contradiction / failing AC-NFR / factual error / ghost ref); else record as deferred. Surgical, preserve ados_distribution, co-update prompt+guide."
    date: "2026-06-26"
  - text: "DEC-6 (OQ-3 resolved): project.flow in inception-state.yaml is the resume source of truth. Valid in-progress -> resume; completed -> 'already incepted'; malformed/schema mismatch -> warn + repair-or-archive. Abandoned-run state archived to doc/inception/abandoned-<ISO>.yaml (added to write allowlist), never silently destroyed. Legacy unaffected (separate git-ignored state)."
    date: "2026-06-26"
  - text: "REM-1 (REVERSES earlier PM decision #3, per red-team RT1-01): code-review-instructions.md generation is scoped to INCEPTION Phase 5 ONLY (per AC15). The legacy <phase_4_draft> is NOT modified — no code-review addition to the legacy recommended-artifacts list. Rationale: no AC requires legacy code-review; AC16/NFR-4 demand legacy unchanged; the legacy addition created the parity-guard contradiction. 'Close the gap in both modes' is DEFERRED to a potential follow-up ticket (surface to human). The user's amendment ('Phase 5 must generate ALL FOUR') is satisfied by inception Phase 5 alone."
    date: "2026-06-27"
  - text: "REM-2 (RT1-01 parity method): TC-STRUCT-003 changes method. Truly-frozen legacy blocks (<workflow_phases>, <persistent_state>, <phase_1_repo_scan>..<phase_6_write>) use whole-block region-diff (byte-identical vs baseline 0a1a288). Shared blocks inception EXTENDS (<resume_behavior>, <write_allowlist>) use legacy-line-presence assertions (every baseline entry/bullet still present verbatim; additions permitted). Honors NFR-4 (behavior equivalent) without freezing shared blocks."
    date: "2026-06-27"
  - text: "REM-3 (RT1-06 inline-vs-referenced boundary): INLINE in each <phase_N_inception> = phase name, human-gate presence, anti-sycophancy technique NAME (via an <anti_sycophancy> sub-tag anchor), artifact KEYS produced (by name), state-update point, one-line guide reference. REFERENCED (NOT duplicated) = substantive artifact content, full anti-sycophancy prompt text, conditional-artifact details, four-risk definitions. Strip parenthetical content details (WCAG level, breakpoints, etc.) from inline authoring spec."
    date: "2026-06-27"
  - text: "REM-4 (RT1-07 size guardrail): TC-INFRA-001 adds a prompt-size guardrail — warn if bootstrapper.md > ~650 lines, hard-fail > ~800 lines (tunable). Makes RSK-1 measured, not just post-hoc triggered."
    date: "2026-06-27"
  - text: "REM-5 (RT1-04): add doc/documentation-profile.md to inception write-allowlist additions (plan + spec + TC-STRUCT-001). It was missing — Phase 5 sets it but it sat outside all allowlist globs."
    date: "2026-06-27"
  - text: "REM-6 (RT1-03): add TC-INCEP-016 — behavioral test for AC15 (run inception Phase 5 in a scratch repo, assert all four .ai/agent/*-instructions.md actually written incl. code-review). Closes the silent-AC-pass-around-gap."
    date: "2026-06-27"
  - text: "REM-7 (RT1-05): unblock TC-RESUME-002 — rewrite pass criterion against DEC-6 (partial -> project.flow resume; abandoned -> archived; malformed/schema mismatch -> warn + repair-or-archive)."
    date: "2026-06-27"
  - text: "REM-8 (RT1-09): anti-sycophancy placement asserts an <anti_sycophancy> sub-tag (anchor) inside each decision-dense phase with correct technique name, ABSENT in phases 0/5/6/7. More robust than free-text keyword scoping."
    date: "2026-06-27"
  - text: "RT2-04 ACCEPTED (not fixing): red-team #2 flagged 'non-trivial git history' as undefined in mode selection. Accepted as-is — the NFR-1 ask-on-ambiguous safety net (0 silent guesses) handles the fuzzy boundary; an arbitrary commit-count gloss would itself be brittle. No fix."
    date: "2026-06-27"
  - text: "REM-9 (USER DIRECTIVE, supersedes the 'preserve legacy' framing): ERADICATE .ai/local/bootstrapper-context.yaml and the GH-32 6-phase legacy flow entirely. The bootstrapper becomes ONE process — the 8-phase inception workflow — with project.flow: new|legacy selecting FRONT-HALF differences (legacy = a pre-ADOS long-lived project -> extract/reconstruct in phases 0-4; new = greenfield -> author). Single state file: doc/inception/inception-state.yaml. No backward-compat, no migration. Redefines 'legacy' (pre-ADOS project, NOT a previously-bootstrapped project). This is the original inception design intent (research notes Section 4); GH-71 had deviated by preserving the old flow out of caution (old AC16). Folding in part of GH-72: the legacy front-half phase behaviors (repo ingestion P0, extract-not-author + behavioral-spec extraction from tests P1, next-milestone scope-not-MVP + tribal-knowledge graduation P2, reconstruct-architecture-from-code + flag uncertainty P3, audit-existing-conventions-vs-FSE P4). GH-33 tribal-knowledge EXTRACTION machinery stays a separate follow-up (the prompt only consumes/graduates a tribal-knowledge.md if present)."
    date: "2026-06-27"
  - text: "REM-10 (USER DIRECTIVE, Q1): DELETE scripts/.tests/test-bootstrapper-prompt-structure.sh — it hardcoded prompt structure (grep-as-a-test), gave false confidence, and would fossilize TDR-0001's chosen wording against future evolution. TDR-0001 is the right home for the structure decision; behavioral correctness is the manual TC-INCEP-* matrix + PR review, not CI. The two-tier legacy-parity guard (its only defensible piece) dissolves anyway under REM-9 (no frozen legacy blocks remain)."
    date: "2026-06-27"

