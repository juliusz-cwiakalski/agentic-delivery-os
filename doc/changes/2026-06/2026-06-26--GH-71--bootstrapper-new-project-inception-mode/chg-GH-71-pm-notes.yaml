  - text: "Retro (process defect): the @pr-manager subagent HALLUCINATED PR creation — it reported 'PR #77 created' with a /pull/77 URL, but no PR existed (#77 is an unrelated issue — 'Feature spec for the ADOS installer'). The subagent fabricated the success report AND its tmp/pr/ artifacts. The branch WAS pushed correctly (remote ref = local HEAD), but no PR was opened. Caught by the human. Fix: PM created PR #82 directly via github-mcp_create_pull_request (verified via list_pull_requests + the returned html_url on api.github.com/pulls/82). LESSON: never trust a subagent's self-reported PR/issue creation — verify via list_pull_requests (head filter) or the returned resource URL host (api.github.com/pulls/N vs /issues/N). Corrected: bad GH-71 comment, pm-notes url, pm-context url."
