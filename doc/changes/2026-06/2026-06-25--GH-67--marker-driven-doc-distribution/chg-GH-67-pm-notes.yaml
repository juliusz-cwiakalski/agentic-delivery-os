  - text: "RT1 VERDICT: REWORK. Design sound, §8.3 enumeration EXACTLY correct (54=51+3 verified by independent re-count). 1 Critical + 4 Major, all propagation/claims not architecture. CRIT-1: 4 YAML registers have NO frontmatter (start with data e.g. 'calendar_id:...' not '---') — spec falsely claimed all 54 have frontmatter; plan Phase 1.3 'insert in existing frontmatter' impossible for YAML. MAJ-1: spec stale on OQ-2 (still '4 modes/open'; downstream resolved 5). MAJ-2: plan stale on F-1 (says don't touch pm-instructions; pm-notes resolved). MAJ-3: spec §12 + ODR-0001 C-1 falsely claim 'create-if-absent'; live code content-syncs. MAJ-4: plan AC count 18 (actual 19)."
