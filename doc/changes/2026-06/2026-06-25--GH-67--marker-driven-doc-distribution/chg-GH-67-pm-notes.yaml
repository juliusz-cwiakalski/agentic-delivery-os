  - text: "REWORK DECISIONS (PM, no human escalation needed): CRIT-1 -> two-path parser keyed on extension: .md uses frontmatter --- block; .yaml uses top-level 'ados_distribution:' key (line 1). Rejected: YAML frontmatter block (would create multi-doc YAML breaking safe_load consumers). MAJ-3 -> keep content-sync for templates (correct: templates are pristine references; adopters copy-from not edit-in-place; matches existing .md template behavior); correct false 'create-if-absent' wording in spec §12 + ODR-0001 C-1; no behavior change/new TC beyond accurate doc + copy-from-template convention note. MAJ-1/2/4 -> propagate resolved decisions into spec + plan. Revising all 3 artifacts in parallel with precise edit locations from red-team."
