decisions:
  - text: "RD-1: Constraints section placed between Problem Framing and Decision Drivers."
    date: "2026-06-24"
  - text: "RD-2: Section name 'Constraints (Hard Requirements)'."
    date: "2026-06-24"
  - text: "RD-3: Constraints have a `negotiable` field; each alternative must include explicit compliance evaluation; Decision section attests compliance or documents accepted-risk exception."
    date: "2026-06-24"
  - text: "RD-4: Compliance evaluation format chosen by author (prose vs. matrix) based on readability heuristic; default to matrix when unsure."
    date: "2026-06-24"
  - text: "RD-5: `/plan-decision` warns on driver/constraint overlap; user must categorize before proceeding."
    date: "2026-06-24"
  - text: "Constraint IDs: C-1, C-2, ... per decision record (compact reference from alternatives)."
    date: "2026-06-24"
  - text: "Verification field: not limited to automated checks — can be test, audit, code review, architect sign-off, or demonstration."
    date: "2026-06-24"
  - text: "No new front-matter field for v1; constraints live in body. No separate example decision records — template inline comments must be complete enough."
    date: "2026-06-24"
  - text: "Scope expanded after agent audit: `.opencode/agent/architect.md` also bakes in section structure (lines 176-194) and needs update via @toolsmith. @spec-writer and @plan-writer do NOT bake it in."
    date: "2026-06-24"

