decisions:
  - text: "Single ticket delivery — do not split into multiple tickets despite large scope"
    date: "2026-03-16"
  - text: "Platform-neutral from the start — GitHub and GitLab both supported in v1"
    date: "2026-03-16"
  - text: "Reuse @pr-manager patterns for platform detection, tmp/ workspace conventions"
    date: "2026-03-16"
  - text: "GH-39 scope merged into GH-36: extract hardcoded platform access into .ai/agent/pr-instructions.md"
    date: "2026-03-16"
  - text: "PM must NEVER create tickets autonomously — added policy to pm-instructions.md"
    date: "2026-03-16"
  - text: "Merged .ai/checklists/code-review.md into .ai/agent/code-review-instructions.md — single file for review guidance"
    date: "2026-03-16"
  - text: "Agent prompts made platform-agnostic: pr-instructions.md is REQUIRED, no fallback auto-detection"
    date: "2026-03-19"
  - text: "Language-specific heuristics removed from agent prompt — belong in repo-specific .ai/rules/ and code-review-instructions.md"
    date: "2026-03-19"
  - text: "glab api --raw-field does NOT create nested JSON objects — confirmed via e2e test. curl with JSON body required for GitLab inline discussions"
    date: "2026-03-19"
  - text: "Merged code-reviewer + reviewer into single unified reviewer agent with local and remote modes"
    date: "2026-03-20"
  - text: "PM step 6 enriched with reviewer context; /review and /review-deep commands aligned with unified agent"
    date: "2026-03-20"
